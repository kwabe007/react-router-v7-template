name: Build, test and deploy to staging

  Uncomment to enable workflow
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.gitlab.com
  GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
  GITLAB_PASSWORD: ${{ secrets.GITLAB_PASSWORD }}
  DOKPLOY_DEPLOY_ENDPOINT: ${{ vars.DOKPLOY_DEPLOY_ENDPOINT }}
  DOKPLOY_ACCESS_TOKEN: ${{ secrets.DOKPLOY_ACCESS_TOKEN }}
  DOKPLOY_STAGING_APP_ID: ${{ vars.DOKPLOY_STAGING_APP_ID }}
  IMAGE_NAME: registry.gitlab.com/${{ vars.GITLAB_PROJECT_PATH }}/react-router-app # Change to your app name
  GITHUB_SHA: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITLAB_USERNAME }}
          password: ${{ env.GITLAB_PASSWORD }}

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:ci-$GITHUB_SHA .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:ci-$GITHUB_SHA

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITLAB_USERNAME }}
          password: ${{ env.GITLAB_PASSWORD }}

      - name: Pull image
        run: |
          docker pull $IMAGE_NAME:ci-$GITHUB_SHA

      - name: Run container
        run: |
          docker run -d \
          -p 3000:3000 \
          $IMAGE_NAME:ci-$GITHUB_SHA

      # TODO replace with jtalk/url-health-check-action@v4
      - name: Wait for app to be ready (with output)
        run: |
          for i in {1..5}; do
            sleep 5
            echo "Attempt $i"

            STATUS=$(curl -s -o response.body -w "%{http_code}" http://localhost:3000/)
            echo "HTTP status (index route): $STATUS"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "App is ready"
              exit 0
            fi
          done

          echo "App never became ready"
          RESPONSE=$(curl -v http://localhost:3000/)
          echo -e "HTTP response (index route):\n$RESPONSE\n"
          docker ps -a
          docker logs $(docker ps -aq --latest)
          exit 1

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.12.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: PLAYWRIGHT_BASE_URL="http://localhost:3000" pnpm exec playwright test

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.1

      - name: Update remote image tag
        run: |
          crane auth login $REGISTRY -u $GITLAB_USERNAME -p $GITLAB_PASSWORD
          crane tag $IMAGE_NAME:ci-$GITHUB_SHA staging
          crane delete $IMAGE_NAME:ci-$GITHUB_SHA

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging instance
        run: |
          tmpfile=$(mktemp)

          status=$(curl -s -o "$tmpfile" -w "%{http_code}" -X POST \
          "$DOKPLOY_DEPLOY_ENDPOINT" \
          -H "x-api-key: $DOKPLOY_ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{ \"applicationId\": \"$DOKPLOY_STAGING_APP_ID\"}")

          body=$(cat "$tmpfile")
          rm "$tmpfile"

          if [[ ! $status =~ ^2 ]]; then
            echo "Deployment failed (status $status)" >&2
            echo "Response from server:" >&2
            echo "$body" >&2
            exit 1
          fi

          echo "Deployment queued successfully"
